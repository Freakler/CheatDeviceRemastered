; VEHICLES ;

Vehicles = Fahrzeuge

Disable Traffic = Verkehr deaktivieren
Completely disable the worlds traffic! (Parked vehicles still appear) = Deaktiviere sämtlichen Verkehr in der Welt! (Geparkte Fahrzeuge werden weiterhin erscheinen)

Freeze Traffic = Verkehr einfrieren
Completely freeze the worlds vehicles except your own! = Sämtlicher Verkehr in der Welt wird eingefroren!

Touch Vehicle to: = Berühre ein Fahrzeug um:
make it float away = es abheben zu lassen
set it on fire = es in Brand zu setzen
make it explode = es explodieren zu lassen
unload it = es zu entfernen
lock the doors = es zu verriegeln
unlock the doors = es zu entriegeln
freeze position = es einzufrieren
unfreeze position = es aufzutauen
enter as passenger = als Beifahrer einzusteigen
make peds exit = alle Passagiere aussteigen zu lassen
warp into as spectator = als Beobachter mitzufahren
warp into as driver = als Fahrer einzusteigen
open in HexEditor = es im HexEditor zu öffnen
Decide what should happen with a vehicle as soon as you touch. = Entscheide dich was mit einem Fahrzeug passieren soll sobald de es berührst.

Default RadioStation: = Standard Radiosender:
Radio Off = Radio aus
Select a Radio Station that will be played when entering a vehicle. = Wähle einen Radiosender aus, der beim Einsteigen in ein Fahrzeug gespielt werden soll.

BMX Jump Height: = BMX Sprunghöhe
Adjust the BMXs jump height. = Passe die Sprunghöhe deines BMX Fahrrads an.

Untouchable = Unantastbar
Vehicles wont be able to get near you and will be pushed back. = Fahrzeuge werden dir nie wieder zu Nahe kommen können.

