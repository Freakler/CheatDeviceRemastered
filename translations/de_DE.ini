; PEDESTRIANS ;

Pedestrians = Passanten

Disable Peds = Passanten deaktivieren
Completely disable Pedestrians! (special ones might still appear) = Passanten deaktivieren! (Besondere Charaktere können trotzdem erscheinen)

Freeze Peds = Passanten einfrieren
Freeze Pedestrians current positions in the world. = Die aktuellen Positionen von Fußgängern in der Welt einfrieren.

Touch Ped to: = Passanten berühren um
