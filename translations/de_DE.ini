; CURRENT VEHICLE ;

Current Vehicle = Aktuelles Fahrzeug

Hover Bike & Car = Hoverbike und Auto
Your vehicle hovers and can fly like a hovercraft. = Dein aktuelles Fahrzeug schwebt und kann wie ein Luftkissenfahrzeug fliegen.

Indestructible Vehicle = Unzerstörbares Fahrzeug
Your vehicle is immune to explosions, gunshots, fire etc.. = Dein Fahrzeug ist immun gegen Explosionen, Schüsse, Feuer usw.

Lock Doors when inside = Türverriegelung aktivieren
As soon as you enter a vehicle with doors they will be locked. = Fahrzeuge mit Türen werden von aussen verriegelt sobald du drin bist.

Never fall off Bike = Niemals vom Motorrad fallen
Never fall off your bike when rolling backwards or hitting objects. = Du kannst nicht mehr vom Motrrad fallen vom rückwärts rollen oder Unfällen.

Power Brake = Sofort-bremse
Hitting the brakes will make your vehicle stop immediately. = Durch bremsen kommt dein Fahrzeug sofort zum Stehen.

Primary Color: = Primäre Farbe:
Red: %i Green: %i Blue:>%i<= Rot: %i Grün: %i Blau:>%i<
Red: %i Green:>%i<Blue: %i = Rot: %i Grün:>%i<Blau: %i
Red:>%i<Green: %i Blue: %i = Rot:>%i<Grün: %i Blau: %i
Adjust your current vehicles primary color! = Passe die Grundfarbe deines aktuellen Fahrzeugs an!

Secondary Color: = Sekundäre Farbe:
Adjust your current vehicles secondary color! = Passe die Zweitfarbe deines aktuellen Fahrzeugs an!

Heavy Vehicle = Schweres Fahrzeug
You can easily push other cars and world objects. = Du kannst andere Autos und Weltobjekte problemlos umherschieben.

Automatic Flip Over = Automatische Umdrehen
Never end up stuck on your roof ever again. = Dein Auto kann nie wieder auf dem Dach liegen bleiben.

Drive on walls = An Wänden fahren
Drive on walls! Good luck, its tricky ;) = Du kannst an Wänden und Decken fahren. Viel Glück, denn es ist garnicht so einfach!

N.O.S boost = N.O.S Schub
Press O to activate a 2 sec Nitro Boost for your vehicle. = Drücke KREIS um einen 2-Sekunden-Nitro-Boost für dein Fahrzeug zu aktivieren.

Rocket boost: = Raketenantrieb:
Continuous additional boost to your vehicle forward speed. = Kontinuierlicher zusätzlicher Schub für dein Fahrzeug.

Behave like Tank = Panzereigenschaften
Press O to fire cannon and make vehicles explode when run into! = Drücke KREIS zum schiessen und lasse Fahrzeuge explodieren indem du sie rammst.

Cars drive on Water = Autos fahren auf dem Wasser
Your car can drive on water. = Dein Auto kann auf dem Wasser fahren!

