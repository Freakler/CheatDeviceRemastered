; TELEPORTING ;

Teleporting = Teleportieren

Teleport: = Teleportieren:
Teleport yourself to a preset location on the map. = Teleportiere dich zu einem voreingestellten Ort auf der Karte.

Teleport near marker = Teleportieren zur Kartenmarkierung
Teleport near the custom marker = Teleportiere dich in die Nähe der benutzerdefinierten Kartenmarkierung

Step Through Wall = Nach vorne teleportieren
