; CHEAT DEVICE OPTIONS ;

CheatDevice Options = CheatDevice Optionen

Autostart CheatDevice Menu = CheateDevice Menü automatisch öffnen
Enabling will automatically start the CheatDevice after spawning. = Durch die Aktivierung wird das CheatDevice nach dem Spawnen automatisch gestartet.

Autosave Settings to Config = Automatisches Speichern der Einstellungen
All settings will be auto-saved to config when closing the menu. = Alle Einstellungen werden automatisch in der Konfigurationsdatei gespeichert.

Collapsible Categories = Ausblendbare Kategorien
Choose between collapsible or always expanded categories. = Wähle zwischen einklappbaren oder immer erweiterten Kategorien.

Show popular cheats on top = Beliebte Cheats oben anzeigen
Enabling will show a preset selection of popular Cheats on top. = Beim Aktivieren wird oben eine voreingestellte Auswahl beliebter Cheats angezeigt.

Hide some UserInterfaces in Menu = Benutzeroberflächen im Menü ausblenden
Allow Games's UserInterface elements to be blocked in some menus etc = Erlaubt das Blockieren von einigen Spielelementen für eine besser Sicht im Menu.

Freeze Game when in Menu = Spiel einfrieren wenn Menu im Vordergrund
Freeze the Game when the CheatDevice Menu is in use. = Friert das Spiel ein, wenn das CheatDevice-Menü verwendet wird.

Hide Button Legend & Info = Schaltflächenlegende und -info ausblenden
Hide the button legend allowing for more space and menu displayed! = Blendet die Tasten-Legende aus, um mehr Platz für Menü zu schaffen!

Alternative font for Categories = Alternative Schriftart für Kategorien
Use an alternative font for categories just like the main menu does. = Verwendet für Kategorien eine alternative Schriftart.

Menu Language: = Menüsprache:
Translation done by = Übersetzung erstellt durch

Swap X with R for acceleration = Tausche X und R zum Beschleunigen
Activate this if you use gta_remastered's X and R swapped controls. = Aktiviere diesen Cheat wenn du gta_remastered mit X/R-Vertauschung nutzt.

