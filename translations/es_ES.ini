; PLAYER ;

Player = Jugador

Infinite Health & Armor = Salud y Armadura Infinitas
You are immune to explosions, gunshots, fall damage, fire etc.. = Eres inmune a explosiones, disparos, daño por caída, fuego, etc...

Unlimited Ammo & No reloading = Munición Infinita y Sin Recarga
All your Weapons have unlimited ammunition and no reloading needed. = Todas tus armas tienen munición ilimitada y no necesitan recargarse.

Unlimited sprinting = Carrera Infinita
You are never getting tired from sprinting ever again. = Nunca te cansarás de correr.

Walking Speed: = Velocidad:
Adjust your speed of walking, sprinting etc = Ajusta tu velocidad al caminar, correr, etc...

Invisible = Invisible
You are invisible but can still be attacked. = Eres invisible pero aún puedes ser atacado.

Ignored by everyone = Ignorado por todos
Everyone including police and mission enemys will ignore you. = Todos (policía, enemigos de misiones...) te ignorarán.

Wanted Level: = Nivel de Búsqueda:
%i Stars (%i max) = %i Estrellas (%i max.)
Adjust your Wanted Level, lock it and set the Maximum Level possible. = Ajusta tu Nivel de Búsqueda, bloquealo y establece el nivel máximo posible.

Heavy Player = Jugador Pesado
You can push cars by running against them but are to heavy to jump! = Puedes empujar coches chocando contra ellos pero eres demasiado pesado para saltar!

Aim of Death = Mira de la Muerte
Aiming down at a target will instantly kill it. = Apuntar a un objetivo lo matará instantáneamente.

Model: = Modelo:
Change the actor skin / model. Beware: May break the game! = Cambia el skin / modelo del personaje. AVISO: Puede causar errores!

Maximum Health: = Salud Max.:
Adjust the Multiplier value giving extra health! ('Health Plus') = Ajusta el multiplicador de vida ('Salud+')

Maximum Armor: = Armadura Max.:
Adjust the Multiplier value giving extra armor! ('Armor Plus') = Ajusta el multiplicador de armadura ('Armadura+')

Power Jump = Salto Potenciado
Hold the jumping key to jump as high as you want. = Mantén el botón de salto para saltar tan alto como quieras.

