; PLAYER ;

Player = Jogador

Infinite Health & Armor = Saúde e Colete infinitos
You are immune to explosions, gunshots, fall damage, fire etc.. = És imune a explosões, tiros, dano de queda, fogo, etc...

Unlimited Ammo & No reloading = Munição infinita e sem recarregamento
All your Weapons have unlimited ammunition and no reloading needed. = Todas as tuas armas tem munição infinita e não precisam de ser recarregadas.

Unlimited sprinting = Corrida infinita
You are never getting tired from sprinting ever again. = Nunca mais ficarás cansado de correr.

Walking Speed: = Velocidade:
Adjust your speed of walking, sprinting etc = Ajusta a tua velocidade de correr, andar, etc..

Invisible = Invisivel
You are invisible but can still be attacked. = És invisivel, mas ainda podes ser atacado.

Ignored by everyone = Ignorado por todos
Everyone including police and mission enemys will ignore you. = Todos vão ignorar-te!

Wanted Level: = Nível de procurado:
%i Stars (%i max) = %i Estrelas (%i máx.)
Adjust your Wanted Level, lock it and set the Maximum Level possible. = Ajusta o teu nível de procurado, bloqueia-o e coloca o máx. possivel.

Heavy Player = Jogador pesado
You can push cars by running against them but are to heavy to jump! = Podes empurrar carros correndo contra eles mas não consegues saltar!

Aim of Death = Mira da morte
Aiming down at a target will instantly kill it. = Mirar nalguém matará essa pessoa.

Model: = Modelo:
Change the actor skin / model. Beware: May break the game! = Mudar a tua skin / modelo. AVISO: Poderá causar problemas!

Maximum Health: = Saude Máxima:
Adjust the Multiplier value giving extra health! ('Health Plus') = Ajusta saúde máxima ('Saúde+')

Maximum Armor: = Colete Máximo:
Adjust the Multiplier value giving extra armor! ('Armor Plus') = Ajusta colete máximo ('Colete+')

Power Jump = Salto voador
Hold the jumping key to jump as high as you want. = Pressiona o botão de saltar para saltar o quão alto quiseres.

